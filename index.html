        function linearToSrgbCompanded(channel) {
            if (channel <= 0.0031308) return 12.92 * channel;
            return 1.055 * Math.pow(channel, 1 / 2.4) - 0.055;
        }

        function oklchToLinearSrgb(oklch) {
            const hue = ((typeof oklch.h === 'number' ? oklch.h : 0) % 360 + 360) % 360;
            const hueRad = hue * Math.PI / 180;
            const a = oklch.c * Math.cos(hueRad);
            const b = oklch.c * Math.sin(hueRad);

            const l_ = oklch.l + 0.3963377774 * a + 0.2158037573 * b;
            const m_ = oklch.l - 0.1055613458 * a - 0.0638541728 * b;
            const s_ = oklch.l - 0.0894841775 * a - 1.2914855480 * b;

            const l3 = l_ * l_ * l_;
            const m3 = m_ * m_ * m_;
            const s3 = s_ * s_ * s_;

            return {
                r: 4.0767416621 * l3 - 3.3077115913 * m3 + 0.2309699292 * s3,
                g: -1.2684380046 * l3 + 2.6097574011 * m3 - 0.3413193965 * s3,
                b: -0.0041960863 * l3 - 0.7034186147 * m3 + 1.7076147010 * s3
            };
        }

        function oklchToSrgb(oklch) {
            const linear = oklchToLinearSrgb(oklch);
            return {
                r: linearToSrgbCompanded(linear.r),
                g: linearToSrgbCompanded(linear.g),
                b: linearToSrgbCompanded(linear.b)
            };
        }

        function isSrgbInGamut(rgb) {
            return rgb.r >= 0 && rgb.r <= 1 && rgb.g >= 0 && rgb.g <= 1 && rgb.b >= 0 && rgb.b <= 1;
        }

        function fitToSRGB(oklch) {
            let c = Math.max(0, oklch.c);
            for (let k = 0; k < 30; k++) {
                const candidate = { mode: 'oklch', l: oklch.l, c, h: oklch.h };
                const rgb = oklchToSrgb(candidate);
                if (isSrgbInGamut(rgb)) return candidate;
                c *= 0.92;
            }
            return { mode: 'oklch', l: oklch.l, c: 0, h: oklch.h };
        }

        function srgbToHex(rgb) {
            const r = Math.round(clampNumber(rgb.r, 0, 1) * 255);
            const g = Math.round(clampNumber(rgb.g, 0, 1) * 255);
            const b = Math.round(clampNumber(rgb.b, 0, 1) * 255);
            return `#${[r, g, b].map(v => v.toString(16).padStart(2, '0')).join('').toUpperCase()}`;
        }

        function generateMutedPaletteColors(n, options = {}) {
            const {
                startH = 0,
                endH = 360,
                baseL = 0.60,
                baseC = 0.24,
                jitterL = 0.025,
                jitterC = 0.05
            } = options;

            const colors = [];
            const rawSpan = endH - startH;
            let hueSpan = ((rawSpan % 360) + 360) % 360;
            // Avoid floating point collapse (e.g. 360.0000000001 % 360 ~= tiny number)
            if (Math.abs(hueSpan) < 1e-6) hueSpan = 360;
            for (let i = 0; i < n; i++) {
                // Full regnbue: fordel fargene jevnt rundt hele hue-sirkelen.
                const t = n === 1 ? 0.5 : i / n;
                const h = (startH + hueSpan * t) % 360;

                let l = baseL + (Math.random() * 2 - 1) * jitterL;
                let c = baseC + (Math.random() * 2 - 1) * jitterC;

                // Små designjusteringer: behold mettede og tydelige farger over hele regnbuen.
                if (h <= 95) c += 0.022;               // varme kan ta mer metning
                if (h >= 190 && h <= 245) c += 0.018; // blåtoner mer markerte
                if (h >= 250 && h <= 320) c += 0.025; // lilla/magenta må stå tydelig frem
                if (h >= 45 && h <= 85) l += 0.02;    // gule trenger litt ekstra lyshet
                if (h >= 155 && h <= 230) l -= 0.012; // kjølige litt tyngre

                l = clampNumber(l, 0.46, 0.82);
                c = clampNumber(c, 0.11, 0.36);

                const fitted = fitToSRGB({ mode: 'oklch', l, c, h });
                const rgb = oklchToSrgb(fitted);
                colors.push(srgbToHex(rgb));
            }
            return colors;
        }

        function generatePalette() {
            const subjects = getUniqueSubjects();
            if (!subjects.length) return;
            const shiftKey = `paletteShiftIndex:${currentClassName || 'default'}`;
            const paletteSize = Math.max(1, subjects.length);
            const rawShift = parseInt(localStorage.getItem(shiftKey) || '0', 10);
            const currentShift = Number.isFinite(rawShift) ? ((rawShift % paletteSize) + paletteSize) % paletteSize : 0;
            const step = 360 / paletteSize;
            const startH = currentShift * step;

            const palette = generateMutedPaletteColors(subjects.length, {
                startH,
                endH: startH + 360
            });
            subjects.forEach((subj, idx) => {
                currentClass.subjectColors[subj] = palette[idx];
            });
            localStorage.setItem(shiftKey, String((currentShift + 1) % paletteSize));
            saveClasses();
            openSubjectColorPicker();
            lastTimelineState = null;
            updateActivityAndCountdown();
        }

        function hslToHex(h, s, l) {
            s /= 100; l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => Math.round(255 * (l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)))));
            return '#' + [f(0), f(8), f(4)].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        function makeDraggable(el, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            handle.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                const interactiveTarget = e.target.closest('input, button, select, textarea, label, .timer-close, .timer-control, .timer-ring, .timer-gradient-control');
                if (interactiveTarget) return;

                // Fjern transform slik at vi kan flytte elementet jevnt
                const rect = el.getBoundingClientRect();
                el.style.transform = 'none';
                el.style.left = `${rect.left}px`;
                el.style.top = `${rect.top}px`;

                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
                el.style.right = 'auto'; // Disable right-lock
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

            if (mode === '0') {

                document.body.classList.add('dark-mode', 'ui-dark');

            } else {

            }
