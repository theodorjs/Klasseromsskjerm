<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasseromsskjerm</title>
    <link rel="stylesheet" href="style.css">
    <!-- iOS Fullscreen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KlasseSkjerm">
</head>

<body class="star-mode ui-dark">
    <div class="noise-bg"></div>
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>

    <div class="split-surface">
        <div id="split-top" class="split-layer"
            style="display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 5vh;">
            <div class="toolbox-container" id="toolbox-container">
                <div class="toolbox-main" id="toolbox-main">🧰</div>
                <div class="toolbox-items">
                    <div class="toolbox-item theme-switch-tool" id="tool-mode" aria-label="Tema">
                        <div class="theme-switch-control mode-2" id="theme-switch-control" role="tablist" aria-label="Velg tema">
                            <div class="theme-switch-thumb mode-2" id="theme-switch-thumb" aria-hidden="true">
                                <span class="theme-switch-thumb-icon" id="theme-switch-thumb-icon">✦</span>
                            </div>
                            <button type="button" class="theme-step" data-mode="3" aria-label="Fargerik modus">🌈</button>
                            <button type="button" class="theme-step" data-mode="0" aria-label="Lys modus">☀</button>
                            <button type="button" class="theme-step" data-mode="1" aria-label="Mørk modus">☾</button>
                            <button type="button" class="theme-step active" data-mode="2" aria-label="Stjernemodus">✦</button>
                        </div>
                        <div class="mode-toggle" id="mode-toggle" aria-hidden="true">
                            <div class="slider-track">
                                <input type="range" min="0" max="3" value="2" class="slider" id="mode-slider">
                            </div>
                        </div>
                    </div>
                    <div class="toolbox-item" id="tool-timer">
                        <span class="icon">⏰</span>
                        <span class="label">Timer</span>
                    </div>
                    <div class="toolbox-item countdown-tool" id="tool-countdown">
                        <span class="icon">⏳</span>
                        <span class="label">Nedtelling</span>
                        <div class="countdown-tool-actions">
                            <button type="button" class="countdown-tool-btn" id="countdown-add-btn" aria-label="Opprett ny nedtelling">+</button>
                            <button type="button" class="countdown-tool-btn" id="countdown-visibility-btn" aria-label="Skjul eller vis nedtellinger">👁</button>
                        </div>
                    </div>
                    <div class="toolbox-item" id="tool-agenda">
                        <span class="icon">📋</span>
                        <span class="label">Agenda</span>
                    </div>
                    <div class="toolbox-item" id="tool-note">
                        <span class="icon">🗒️</span>
                        <span class="label">Notat</span>
                    </div>
                    <div class="toolbox-item" id="tool-class">
                        <span class="icon">🏫</span>
                        <span class="label">Klasse</span>
                    </div>
                    <div class="toolbox-item" id="tool-calendar">
                        <span class="icon">📅</span>
                        <span class="label">Velg tid</span>
                        <!-- Unified Time Picker Panel -->
                        <div class="time-picker-panel" id="time-picker-panel">
                            <button type="button" class="time-picker-close" id="time-picker-close-btn" aria-label="Lukk velg tid-vindu">✕</button>
                            <div class="day-list">
                                <button class="day-btn" data-day="Mandag">Mandag</button>
                                <button class="day-btn" data-day="Tirsdag">Tirsdag</button>
                                <button class="day-btn" data-day="Onsdag">Onsdag</button>
                                <button class="day-btn" data-day="Torsdag">Torsdag</button>
                                <button class="day-btn" data-day="Fredag">Fredag</button>
                            </div>
                            <div class="time-selects">
                                <div class="time-row">
                                    <label for="hour-select">Time:</label>
                                    <select id="hour-select" name="hour-select">
                                        <option value="08">08</option>
                                        <option value="09">09</option>
                                        <option value="10">10</option>
                                        <option value="11">11</option>
                                        <option value="12">12</option>
                                        <option value="13">13</option>
                                        <option value="14">14</option>
                                        <option value="15">15</option>
                                    </select>
                                </div>
                                <div class="time-row">
                                    <label for="minute-select">Minutt:</label>
                                    <select id="minute-select" name="minute-select">
                                        <option value="00">00</option>
                                        <option value="05">05</option>
                                        <option value="10">10</option>
                                        <option value="15">15</option>
                                        <option value="20">20</option>
                                        <option value="25">25</option>
                                        <option value="30">30</option>
                                        <option value="35">35</option>
                                        <option value="40">40</option>
                                        <option value="45">45</option>
                                        <option value="50">50</option>
                                        <option value="55">55</option>
                                    </select>
                                </div>
                                <button class="apply-time-btn" id="apply-time-btn">Bruk</button>
                            </div>
                        </div>
                    </div>
                    <div class="toolbox-item" id="tool-lock">
                        <span class="icon" id="lock-icon">🔒</span>
                        <span class="label" id="lock-label">Lås opp</span>
                    </div>
                </div>
            </div>
            <div class="container" id="main-container"></div>
        </div>

        <div id="split-bottom" class="split-layer"
            style="display: flex; flex-direction: column; justify-content: flex-start; padding-top: 5vh;">
            <div class="timeline" id="timeline"></div>
        </div>
    </div>



    <div class="date-time">
        <span id="day-display" data-changed="false"></span>
        <span id="date-display"></span>
        <span id="hour-display" data-changed="false"></span>:<span id="minute-display" data-changed="false"></span>
        <span id="sim-indicator" class="sim-indicator" style="display:none;">Simulert tid</span>
        <button id="sim-reset-btn" class="sim-reset-btn" style="display:none;">Tilbakestill</button>
    </div>
    <div class="countdown-stack" id="countdown-stack" aria-live="polite"></div>
    <div class="timer-panel" id="timer-panel">
        <div class="timer-card">
            <div class="timer-close" id="timer-close-btn">✕</div>
            <div class="timer-ring">
                <svg viewBox="0 0 246 246">
                    <defs>
                        <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop id="timer-gradient-start" offset="0%" stop-color="#20D5E9" />
                            <stop id="timer-gradient-mid" offset="52%" stop-color="#903BDF" />
                            <stop id="timer-gradient-end" offset="100%" stop-color="#20D5E9" />
                        </linearGradient>
                    </defs>
                    <circle class="circle-bg" cx="123" cy="123" r="111.5"></circle>
                    <circle class="circle-fill" cx="123" cy="123" r="111.5"></circle>
                </svg>
                <div class="timer-center">
                    <div id="timer-hour-readout" class="timer-center-line timer-center-hour">00</div>
                    <div id="timer-min-readout" class="timer-center-line">00</div>
                    <div id="timer-sec-readout" class="timer-center-sub">00</div>
                </div>
            </div>
            <div class="timer-gradient-control" id="timer-gradient-control" aria-hidden="true">
                <input type="color" id="timer-gradient-picker" value="#20D5E9" aria-label="Velg timer-farge">
            </div>

            <div class="timer-input-vertical">
                <div class="inputGroup time-unit">
                    <label class="time-unit-label" for="timer-hours">Timer</label>
                    <div class="time-unit-row">
                        <div class="time-unit-field" data-unit="Timer">
                            <input type="number" id="timer-hours" min="0" max="99" inputmode="numeric">
                        </div>
                        <div class="time-spin" aria-hidden="false">
                            <button type="button" class="time-spin-btn" data-target="timer-hours" data-delta="1" aria-label="Øk timer">
                                <span class="time-spin-chevron up"></span>
                            </button>
                            <button type="button" class="time-spin-btn" data-target="timer-hours" data-delta="-1" aria-label="Reduser timer">
                                <span class="time-spin-chevron down"></span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="inputGroup time-unit">
                    <label class="time-unit-label" for="timer-minutes">Minutter</label>
                    <div class="time-unit-row">
                        <div class="time-unit-field" data-unit="Minutter">
                            <input type="number" id="timer-minutes" min="0" max="59" inputmode="numeric">
                        </div>
                        <div class="time-spin" aria-hidden="false">
                            <button type="button" class="time-spin-btn" data-target="timer-minutes" data-delta="1" aria-label="Øk minutter">
                                <span class="time-spin-chevron up"></span>
                            </button>
                            <button type="button" class="time-spin-btn" data-target="timer-minutes" data-delta="-1" aria-label="Reduser minutter">
                                <span class="time-spin-chevron down"></span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="inputGroup time-unit">
                    <label class="time-unit-label" for="timer-seconds">Sekunder</label>
                    <div class="time-unit-row">
                        <div class="time-unit-field" data-unit="Sekunder">
                            <input type="number" id="timer-seconds" min="0" max="59" inputmode="numeric">
                        </div>
                        <div class="time-spin" aria-hidden="false">
                            <button type="button" class="time-spin-btn" data-target="timer-seconds" data-delta="1" aria-label="Øk sekunder">
                                <span class="time-spin-chevron up"></span>
                            </button>
                            <button type="button" class="time-spin-btn" data-target="timer-seconds" data-delta="-1" aria-label="Reduser sekunder">
                                <span class="time-spin-chevron down"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="timer-buttons">
                <button class="timer-control timer-toggle" id="timer-start" aria-label="Start eller pause timer">
                    <svg class="timer-icon timer-icon-play" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 5v14l11-7z"></path>
                    </svg>
                    <svg class="timer-icon timer-icon-pause" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 5h4v14H7zM13 5h4v14h-4z"></path>
                    </svg>
                </button>
                <button class="timer-control timer-stop" id="timer-reset" aria-label="Stopp og nullstill timer">
                    <svg class="timer-icon timer-icon-stop" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 7h10v10H7z"></path>
                    </svg>
                </button>
            </div>
            <div id="timer-display" style="display:none;">00:00:00</div>
            <div id="reset-text" style="display:none;">Nullstill</div>
        </div>
    </div>

    <div class="reset-button" id="reset-button">Tilbakestill</div>
    <div id="under-the-hood" class="noise-bg">
        <!-- Content injected via JS -->
    </div>

    <div class="agenda-sidebar" id="agenda-sidebar">
        <div class="agenda-drag-handle" id="agenda-drag-handle">
            <div class="agenda-title-wrap">
                <div class="agenda-title">Agenda</div>
                <div class="agenda-subtitle" id="agenda-subtitle">Velg et fag for å starte</div>
            </div>
            <button type="button" class="agenda-close-btn" id="agenda-close-btn" aria-label="Lukk agenda">✕</button>
        </div>
        <div class="agenda-header">
            <button type="button" class="agenda-add-btn" id="agenda-add-btn" aria-label="Legg til gjøremål">+</button>
            <button type="button" class="agenda-subject-btn" id="agenda-subject-btn" aria-haspopup="listbox" aria-expanded="false">Fag</button>
            <select id="agenda-subject-select" hidden>
                <option value="">Velg fag...</option>
            </select>
            <div class="agenda-subject-menu" id="agenda-subject-menu" role="listbox" aria-label="Velg fag"></div>
        </div>
        <div class="agenda-items" id="agenda-items">
            <!-- Activities will be injected here -->
        </div>
        <div id="agenda-footer" class="agenda-footer">
        </div>
    </div>

    <div class="note-panel" id="note-panel">
        <div class="note-drag-handle" id="note-drag-handle" aria-hidden="true"></div>
        <button type="button" class="note-close-btn" id="note-close-btn" aria-label="Lukk notat">✕</button>
        <div class="note-toolbar" id="note-toolbar" aria-hidden="true">
            <button type="button" class="note-toolbar-btn" data-command="bold" aria-label="Fet skrift"><strong>B</strong></button>
            <button type="button" class="note-toolbar-btn" data-command="italic" aria-label="Kursiv"><em>I</em></button>
            <button type="button" class="note-toolbar-btn" data-command="underline" aria-label="Understrek"><u>U</u></button>
        </div>
        <div
            class="note-editor"
            id="note-editor"
            contenteditable="true"
            spellcheck="false"
            aria-label="Notat"
        ></div>
    </div>

    <div class="edit-modal" id="edit-modal">
        <input type="text" id="edit-activity-input" placeholder="Nytt aktivitetsnavn">
        <button id="save-activity">Lagre</button>
        <button id="reset-activity">Tilbakestill</button>
        <button id="cancel-edit">Avbryt</button>
    </div>

    <!-- Activity Add/Edit Modal -->
    <div class="edit-modal" id="activity-modal">
        <h2 id="activity-modal-title" style="margin-top: 0; font-size: 1.2rem;">Ny aktivitet</h2>
        <div class="activity-form-row">
            <label class="activity-form-label" for="activity-name-input">Navn</label>
            <input type="text" id="activity-name-input" placeholder="Navn (f.eks. Intro)">
        </div>
        <div class="activity-form-row activity-form-row-compact">
            <label class="activity-form-label" for="activity-emoji-input">Emoji</label>
            <input type="text" id="activity-emoji-input" placeholder="Velg" maxlength="2" style="width: 84px;">
        </div>
        <div class="activity-form-row">
            <label class="activity-form-label" for="activity-duration-input">Varighet</label>
            <input type="number" id="activity-duration-input" placeholder="Varighet (minutter)">
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="activity-save">Lagre</button>
            <button id="activity-cancel">Avbryt</button>
        </div>
    </div>

    <div class="edit-modal" id="countdown-modal">
        <h2 id="countdown-modal-title" style="margin-top: 0; font-size: 1.2rem;">Ny nedtelling</h2>
        <div class="activity-form-row">
            <label class="activity-form-label" for="countdown-title-input">Tittel</label>
            <input type="text" id="countdown-title-input" placeholder="Tittel">
        </div>
        <div class="activity-form-row">
            <label class="activity-form-label" for="countdown-date-input">Dato</label>
            <input type="date" id="countdown-date-input">
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button id="countdown-save">Lagre</button>
            <button id="countdown-delete" style="display:none;">Slett</button>
            <button id="countdown-cancel">Avbryt</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="edit-modal" id="login-modal">
        <h2 style="margin-top: 0; font-size: 1.2rem;">Lærer-innlogging</h2>
        <div class="login-input-container">
            <input type="password" id="login-password-input" placeholder="Passord">
        </div>
        <div id="login-error" style="color: #f44336; font-size: 0.8rem; display: none;">Feil passord</div>
        <button id="login-submit" class="neumorphic-btn">Logg inn</button>
        <button id="login-cancel" class="neumorphic-btn">Avbryt</button>
    </div>

    <!-- Subject Color Detail Modal -->
    <div class="edit-modal" id="color-detail-modal">
        <h2 id="color-subject-title" style="margin-top: 0; font-size: 1.2rem;">Fagfarge</h2>
        <div id="color-preview-large"
            style="width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        </div>

        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <input type="color" id="subject-color-input"
                style="width: 100%; height: 50px; cursor: pointer; border: none; background: none;">

            <div style="display: grid; grid-template-columns: 1fr auto auto; gap: 10px; width: 100%; align-items:center;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div id="subject-emoji-preview" style="font-size:1.4rem; width:32px; text-align:center;">🎨</div>
                    <button id="subject-emoji-btn" class="neumorphic-btn" style="padding: 8px 10px; font-size: 0.85rem;">🙂 Emoji</button>
                </div>
                <input type="text" id="subject-hex-input" placeholder="#FFFFFF"
                    style="text-align: center; font-family: monospace;">
                <button id="subject-color-copy" class="neumorphic-btn" style="padding: 10px; font-size: 0.8rem;">📋 Kopier</button>
                <button id="subject-color-paste" class="neumorphic-btn" style="padding: 10px; font-size: 0.8rem;">📋 Lim inn</button>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px; justify-content: center;">
            <button id="subject-color-save" class="neumorphic-btn"
                style="background: var(--accent-color); color: white;">Lagre</button>
            <button id="subject-color-cancel" class="neumorphic-btn">Avbryt</button>
        </div>
    </div>

    <script>
        // Standardmal for en klasse slik at vi kan re-bruke den (og unngå undefined defaultClasses)
        const defaultClassTemplate = {
            teacher: "Mathias",
            schedule: {
                "Mandag": [
                    { time: "08:30", activity: "Kunst og håndverk 7. / Naturfag 8.", end: "09:30" },
                    { time: "09:40", activity: "Kunst og håndverk 7. / Kroppsøving 8.", end: "10:40" },
                    { time: "11:25", activity: "Norsk 7.-8.", end: "12:25" },
                    { time: "12:35", activity: "KRLE 7.-8.", end: "13:35" },
                    { time: "13:35", activity: "Engelsk 7.-8.", end: "14:35" }
                ],
                "Tirsdag": [
                    { time: "08:30", activity: "Kroppsøving 7. / Matematikk 8.", end: "09:30" },
                    { time: "09:40", activity: "Norsk 7.-8.", end: "10:40" },
                    { time: "11:25", activity: "Engelsk 7.-8.", end: "12:25" },
                    { time: "12:35", activity: "Matematikk 7. / Kroppsøving 8.", end: "13:35" },
                    { time: "13:35", activity: "Leksehjelp", end: "14:35" }
                ],
                "Onsdag": [
                    { time: "08:30", activity: "Musikk 7.-8.", end: "09:30" },
                    { time: "09:40", activity: "Musikk 7. / Matematikk 8.", end: "10:40" },
                    { time: "11:25", activity: "Naturfag 7.-8.", end: "12:25" },
                    { time: "12:35", activity: "Valgfag 8.", end: "13:35" },
                    { time: "13:35", activity: "Valgfag 8.", end: "14:35" }
                ],
                "Torsdag": [
                    { time: "08:30", activity: "Matematikk 7. / Matematikk 8.", end: "09:30" },
                    { time: "09:40", activity: "Norsk 7.-8.", end: "10:40" },
                    { time: "11:25", activity: "Norsk 7. / Kunst og håndverk 8.", end: "12:25" },
                    { time: "12:35", activity: "Naturfag 7. / Kunst og håndverk 8.", end: "13:35" }
                ],
                "Fredag": [
                    { time: "08:30", activity: "Matematikk 7. / Språkfag 8.", end: "09:30" },
                    { time: "09:40", activity: "Kroppsøving 7. / Språkfag 8.", end: "10:40" },
                    { time: "11:25", activity: "Samfunnsfag 7.-8.", end: "12:25" },
                    { time: "12:35", activity: "Samfunnsfag 7.-8.", end: "13:35" }
                ]
            },
            mainTimes: [
                { start: "08:30", end: "09:30" },
                { start: "09:40", end: "10:40" },
                { start: "11:25", end: "12:25" },
                { start: "12:35", end: "13:35" },
                { start: "13:35", end: "14:35" }
            ],
            breaks: {
                "Mandag": [
                    { time: "09:30", end: "09:40", activity: "Pause" },
                    { time: "10:40", end: "11:00", activity: "Mat" },
                    { time: "11:00", end: "11:25", activity: "Storefri" },
                    { time: "12:25", end: "12:35", activity: "Pause" }
                ],
                "Tirsdag": [
                    { time: "09:30", end: "09:40", activity: "Pause" },
                    { time: "10:40", end: "11:00", activity: "Mat" },
                    { time: "11:00", end: "11:25", activity: "Storefri" },
                    { time: "12:25", end: "12:35", activity: "Pause" }
                ],
                "Onsdag": [
                    { time: "09:30", end: "09:40", activity: "Pause" },
                    { time: "10:40", end: "11:00", activity: "Mat" },
                    { time: "11:00", end: "11:25", activity: "Storefri" },
                    { time: "12:25", end: "12:35", activity: "Pause" }
                ],
                "Torsdag": [
                    { time: "09:30", end: "09:40", activity: "Pause" },
                    { time: "10:40", end: "11:00", activity: "Mat" },
                    { time: "11:00", end: "11:25", activity: "Storefri" },
                    { time: "12:25", end: "12:35", activity: "Pause" }
                ],
                "Fredag": [
                    { time: "09:30", end: "09:40", activity: "Pause" },
                    { time: "10:40", end: "11:00", activity: "Mat" },
                    { time: "11:00", end: "11:25", activity: "Storefri" },
                    { time: "12:25", end: "12:35", activity: "Pause" }
                ]
            },
            agendas: {},
            templates: {},
            subjectColors: {},
            customCountdowns: [],
            countdownsVisible: true
        };

        const defaultClasses = { Standard: defaultClassTemplate };

        function cloneDefaultClass() {
            return JSON.parse(JSON.stringify(defaultClassTemplate));
        }

        // Initialize classes data
        let classes = {};
        try {
            const savedData = localStorage.getItem('klasseromData');
            if (savedData) {
                classes = JSON.parse(savedData);
            }
        } catch (e) {
            console.error("Error parsing klasseromData", e);
        }

        if (!classes || Object.keys(classes).length === 0) {
            classes = { "7. og 8.": cloneDefaultClass() };
            classes["7. og 8."].name = "7. og 8.";
            localStorage.setItem('klasseromData', JSON.stringify(classes));
        }

        // Migrer gammel standardklasse "9A" til ny standard "7. og 8."
        // Kun når den ser ut som den opprinnelige defaulten: eneste klasse i lagret data.
        const classNamesAfterLoad = Object.keys(classes);
        if (classNamesAfterLoad.length === 1 && classNamesAfterLoad[0] === "9A") {
            classes["7. og 8."] = classes["9A"];
            classes["7. og 8."].name = "7. og 8.";
            delete classes["9A"];
            localStorage.setItem('klasseromData', JSON.stringify(classes));
            const storedCurrentClassName = localStorage.getItem('currentClassName');
            if (!storedCurrentClassName || storedCurrentClassName === "9A") {
                localStorage.setItem('currentClassName', "7. og 8.");

        // men bare dersom klassen fortsatt ser ut som den gamle generiske malen.
        (function migrateLegacySevenEightTemplate() {

        function normalizeSubjectLabel(rawLabel) {
            const cleaned = String(rawLabel || '')
                .replace(/\s+/g, ' ')
                .trim();
            if (!cleaned) return '';
            return cleaned.replace(/(\d+)\.?\s*-\s*(\d+)\./g, '$1.-$2.');
        }

        function normalizeSubjectKeyMap(map, mergeArrays = false) {
            const source = map && typeof map === 'object' ? map : {};
            const normalized = {};
            Object.entries(source).forEach(([key, value]) => {
                const normalizedKey = normalizeSubjectLabel(key);
                if (!normalizedKey) return;
                if (mergeArrays && Array.isArray(value)) {
                    if (!Array.isArray(normalized[normalizedKey])) normalized[normalizedKey] = [];
                    normalized[normalizedKey].push(...JSON.parse(JSON.stringify(value)));
                    return;
                }
                if (normalized[normalizedKey] === undefined) {
                    normalized[normalizedKey] = value;
                }
            });
            return normalized;
        }

        function normalizeCountdownEntries(list) {
            if (!Array.isArray(list)) return [];
            return list
                .map((item, index) => {
                    if (!item || typeof item !== 'object') return null;
                    const title = String(item.title || '').trim();
                    const targetDate = String(item.targetDate || '').trim();
                    if (!title || !/^\d{4}-\d{2}-\d{2}$/.test(targetDate)) return null;
                    return {
                        id: item.id || `countdown-${Date.now()}-${index}`,
                        title,
                        targetDate
                    };
                })
                .filter(Boolean)
                .slice(0, 3);
        }

        function normalizeStoredTimeValue(rawValue) {
            if (rawValue === null || rawValue === undefined) return '';
            const value = String(rawValue).trim();
            if (!value) return '';
            if (/^\d{1,4}$/.test(value)) {
                const minutes = parseInt(value, 10);
                if (Number.isFinite(minutes) && minutes >= 0 && minutes < 24 * 60) {
                    return formatMinutesAsTime(minutes);
                }
            }
            return value;
        }

        function normalizeScheduleEntries(list) {
            if (!Array.isArray(list)) return [];
            return list
                .map((entry) => {
                    if (!entry || typeof entry !== 'object') return null;
                    return {
                        ...entry,
                        time: normalizeStoredTimeValue(entry.time),
                        end: normalizeStoredTimeValue(entry.end)
                    };
                })
                .filter((entry) => entry && entry.time && entry.end);
        }

        function normalizeMainTimes(list) {
            if (!Array.isArray(list)) return [];
            return list
                .map((entry) => {
                    if (!entry || typeof entry !== 'object') return null;
                    const start = normalizeStoredTimeValue(entry.start);
                    const end = normalizeStoredTimeValue(entry.end);
                    if (!start || !end) return null;
                    return { start, end };
                })
                .filter(Boolean);
        }

        function getMinutesFromTime(timeStr) {
            if (!timeStr || typeof timeStr !== 'string') return 0;
            const parts = timeStr.trim().split(/[:.]/).map(Number);
            if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return 0;
            return parts[0] * 60 + parts[1];
        }

        function formatDurationHoursMinutes(totalMinutes) {
            const safeMinutes = Math.max(0, Math.floor(totalMinutes));
            const hours = Math.floor(safeMinutes / 60);
            const minutes = safeMinutes % 60;
            if (hours > 0 && minutes > 0) return `${hours} t ${minutes} min.`;
            if (hours > 0) return `${hours} t`;
            return `${minutes} min.`;
        }

        function formatDurationSmart(totalMinutes) {
            const safeMinutes = Math.max(0, Math.floor(totalMinutes));
            if (safeMinutes > 60) return formatDurationHoursMinutes(safeMinutes);
            return `${safeMinutes} min.`;
        }

        function getDaysRemaining(targetDate) {
            if (!/^\d{4}-\d{2}-\d{2}$/.test(String(targetDate || ''))) return 0;
            const today = new Date();
            const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const [year, month, day] = String(targetDate).split('-').map(Number);
            const target = new Date(year, month - 1, day);
            const diff = target.getTime() - todayStart.getTime();
            return Math.max(0, Math.round(diff / 86400000));
        }

        function getMinutesUntilNextMondayStart(currentDay, currentMinutes, mondayStartMinutes) {
            const weekdayOrder = ["Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag", "Lørdag", "Søndag"];
            const dayIndex = weekdayOrder.indexOf(currentDay);
            if (dayIndex === -1) return Math.max(0, mondayStartMinutes - currentMinutes);

            let daysUntilMonday = (7 - dayIndex) % 7;
            if (daysUntilMonday === 0 && currentMinutes >= mondayStartMinutes) {
                daysUntilMonday = 7;
            }

            const dayOffsetMinutes = daysUntilMonday * 24 * 60;
            return Math.max(0, dayOffsetMinutes + (mondayStartMinutes - currentMinutes));
        }

            let realDay = new Intl.DateTimeFormat('no-NO', {

                `${hDisp.textContent.trim().padStart(2, '0')}:${mDisp.textContent.trim().padStart(2, '0')}` :

        function createTimeline(currentMinutes, useRealTime) {
            const timeline = document.getElementById("timeline");
            if (!timeline) return;
            const { currentDay } = getOsloTimeAndDay();
            const timelineClassNames = normalizeActiveTimelineClassNames(activeTimelineClassNames);
            const timelineStates = timelineClassNames
                .map(className => getClassScheduleState(className, currentDay, currentMinutes))
                .filter(Boolean);

            if (timelineStates.length === 0 || timelineStates.every(state => state.normalizedDayEvents.length === 0)) {
                const noScheduleText = ["Lørdag", "Søndag"].includes(currentDay)
                    ? "Ingen undervisning i dag"
                    : "Ingen timeplan for valgt dag.";
                timeline.innerHTML = `<div class="timeline-empty">${noScheduleText}</div>`;
                timeline.classList.remove('multi-class');
                lastTimelineState = null;
                return;
            }

            const multipleClasses = timelineStates.length > 1;
            const timelineState = JSON.stringify({
                classes: timelineStates.map(state => ({
                    className: state.className,
                    events: state.normalizedDayEvents.map(event => ({
                        time: event.time,
                        activity: event.displayActivity,
                        end: event.end,
                        type: event.type
                    }))
                })),
                currentDay,
                isTeacher: editPermission,
                mode: modeSlider ? modeSlider.value : '0'
            });

            if (lastTimelineState !== timelineState || (modeSlider && document.body.dataset.lastMode !== modeSlider.value)) {
                lastTimelineState = timelineState;
                if (modeSlider) document.body.dataset.lastMode = modeSlider.value;

                timeline.innerHTML = '';
                timeline.classList.toggle('multi-class', multipleClasses);

                let activeHoverBox = null;

                timelineStates.forEach((state) => {
                    const row = document.createElement('div');
                    row.className = `timeline-row ${multipleClasses ? 'with-badge' : ''}`;

                    if (multipleClasses) {
                        const badge = document.createElement('div');
                        badge.className = 'timeline-class-badge';
                        badge.textContent = getClassBadgeLabel(state.className);
                        row.appendChild(badge);
                    }

                    const track = document.createElement('div');
                    track.className = 'timeline-track';
                    track.dataset.schoolStart = String(state.schoolDayStart);
                    track.dataset.schoolEnd = String(state.schoolDayEnd);
                    row.appendChild(track);

                    if (state.normalizedDayEvents.length === 0) {
                        const empty = document.createElement('div');
                        empty.className = 'timeline-row-empty';
                        empty.textContent = 'Ingen timeplan';
                        track.appendChild(empty);
                        timeline.appendChild(row);
                        return;
                    }

                    const marker = document.createElement('div');
                    marker.className = 'marker';
                    track.appendChild(marker);

                    const schoolDayDuration = Math.max(1, state.schoolDayEnd - state.schoolDayStart);
                    state.normalizedDayEvents.forEach((event) => {
                        const startTime = event.start;
                        const endTime = event.end;
                        const duration = endTime - startTime;
                        const widthPercent = (duration / schoolDayDuration) * 100;

                        const box = document.createElement("div");
                        box.className = `event-box ${event.type === "break" ? "break" : ""} ${editPermission ? "editable" : ""}`;
                        box.style.width = `calc(${widthPercent}% - 2px)`;
                        box.dataset.startTime = String(startTime);
                        box.dataset.endTime = String(endTime);
                        box.dataset.className = state.className;

                        const eventKey = getTempScheduleKey(state.className, currentDay, event.time);
                        const legacyEventKey = `${currentDay}-${event.time}`;
                        const tempActivity = Object.prototype.hasOwnProperty.call(tempScheduleChanges.changes, eventKey)
                            || Object.prototype.hasOwnProperty.call(tempScheduleChanges.changes, legacyEventKey);

            const container = document.getElementById("main-container");
            const now = new Date();
            const isWeekend = (now.getDay() === 0 || now.getDay() === 6) && useRealTime;
            let schoolStartCountdownText = "";

            if (isWeekend) {
                container.innerHTML = '<div id="current-activity" class="bold">Endelig helg!</div>';
            } else if (currentMinutes >= schoolDayEnd) {
                container.innerHTML = currentDay === "Fredag" ?
                    '<div id="current-activity" class="bold">Endelig helg!</div>' :
                    '<div id="current-activity" class="bold">Skoledagen er over!</div>';

                schoolStartCountdownText = formatDurationSmart(firstClassTime - currentMinutes);
                container.innerHTML = `<div class="main-start-label">Skoledagen begynner om</div><div id="current-activity" class="bold"></div><div class="thin countdown" id="countdown-container"></div>`;
            } else {
                const displayStr = displayStates.length > 1
                    ? displayStates.map(state => {
                        const activityLabel = state.currentActivity === "FRI"

                            : formatExpandedActivityDisplay(state.currentActivity);

            }

            // Countdown logic
            let nextTime = null;
            let isNextBreak = false;
            let countdownText = schoolStartCountdownText;

            if (!schoolStartCountdownText) {
                if (currentActivity === "Mat") {
                    if (currentEventEnd !== null && currentMinutes < currentEventEnd) {
                        countdownText = `Det er ${formatDurationSmart(currentEventEnd - currentMinutes)} igjen av spisetiden`;
                    } else {
                        for (let e of todaySchedule) {
                            const t = getMinutesFromTime(e.time);
                            if (currentMinutes < t) { nextTime = t; break; }
                        }
                        if (nextTime) countdownText = `Det er ${formatDurationSmart(nextTime - currentMinutes)} igjen av spisetiden`;
                    }
                } else if (["Pause", "Storefri"].includes(currentActivity)) {
                    if (currentEventEnd !== null && currentMinutes < currentEventEnd) {
                        countdownText = `Neste time begynner om ${formatDurationSmart(currentEventEnd - currentMinutes)}`;
                    } else {
                        for (let e of todaySchedule) {
                            const t = getMinutesFromTime(e.time);
                            if (currentMinutes < t) { nextTime = t; break; }
                        }
                        if (nextTime) countdownText = `Neste time begynner om ${formatDurationSmart(nextTime - currentMinutes)}`;
                    }
                } else if (currentActivity !== "FRI") {
                    if (currentEventEnd !== null && currentMinutes < currentEventEnd) {
                        countdownText = `Det er ${formatDurationSmart(currentEventEnd - currentMinutes)} igjen av timen`;
                    } else {
                        for (let b of breakSchedule) {
                            const t = getMinutesFromTime(b.time);
                            if (currentMinutes < t) { nextTime = t; isNextBreak = true; break; }
                        }
                        if (!nextTime && currentMinutes < schoolDayEnd) nextTime = schoolDayEnd;
                        if (nextTime) {
                            const diff = nextTime - currentMinutes;
                            countdownText = isNextBreak

                    }
                }
            }
            const cCount = document.getElementById("countdown-container");
            if (cCount) cCount.textContent = countdownText;

            createTimeline(currentMinutes, useRealTime);

        const TIMER_GRADIENT_STORAGE_KEY = 'timerGradientBaseColor';
        const TIMER_GRADIENT_DEFAULT = '#20D5E9';

        function normalizeHexColor(rawColor) {
            if (typeof rawColor !== 'string') return null;
            const value = rawColor.trim();
            if (/^#[0-9a-fA-F]{6}$/.test(value)) return value.toUpperCase();
            if (/^#[0-9a-fA-F]{3}$/.test(value)) {
                const [r, g, b] = value.slice(1).split('');
                return `#${r}${r}${g}${g}${b}${b}`.toUpperCase();
            }
            return null;
        }

        function hexToRgbChannels(hexColor) {
            const normalized = normalizeHexColor(hexColor);
            if (!normalized) return null;
            return {
                r: parseInt(normalized.slice(1, 3), 16),
                g: parseInt(normalized.slice(3, 5), 16),
                b: parseInt(normalized.slice(5, 7), 16)
            };
        }

        function getRelativeLuminance(hexColor) {
            const rgb = hexToRgbChannels(hexColor);
            if (!rgb) return 0;
            const channels = [rgb.r, rgb.g, rgb.b].map((channel) => {
                const value = channel / 255;
                return value <= 0.03928
                    ? value / 12.92
                    : Math.pow((value + 0.055) / 1.055, 2.4);
            });
            return (0.2126 * channels[0]) + (0.7152 * channels[1]) + (0.0722 * channels[2]);
        }

        function getContrastRatio(colorA, colorB) {
            const luminanceA = getRelativeLuminance(colorA);
            const luminanceB = getRelativeLuminance(colorB);
            const lighter = Math.max(luminanceA, luminanceB);
            const darker = Math.min(luminanceA, luminanceB);
            return (lighter + 0.05) / (darker + 0.05);
        }

        function getReadableAgendaTextColor(backgroundHex) {
            const white = '#F8FBFF';
            const dark = '#5F5F5F';
            return getContrastRatio(backgroundHex, dark) >= getContrastRatio(backgroundHex, white) ? dark : white;
        }

        function hexToHsl(hexColor) {
            const normalized = normalizeHexColor(hexColor) || TIMER_GRADIENT_DEFAULT;
            const r = parseInt(normalized.slice(1, 3), 16) / 255;
            const g = parseInt(normalized.slice(3, 5), 16) / 255;
            const b = parseInt(normalized.slice(5, 7), 16) / 255;

            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const delta = max - min;
            let h = 0;
            let s = 0;
            const l = (max + min) / 2;

            if (delta !== 0) {
                if (max === r) h = ((g - b) / delta) % 6;
                else if (max === g) h = ((b - r) / delta) + 2;
                else h = ((r - g) / delta) + 4;
                h = Math.round(h * 60);
                if (h < 0) h += 360;
                s = delta / (1 - Math.abs(2 * l - 1));
            }

            return {
                h,
                s: Math.round((s || 0) * 100),
                l: Math.round(l * 100)
            };
        }

        function applyTimerGradient(baseHexColor, persist = true) {
            const baseColor = normalizeHexColor(baseHexColor) || TIMER_GRADIENT_DEFAULT;
            const { h, s, l } = hexToHsl(baseColor);

            const combinedXMin = Math.min(rect.left, itemsRect.left) - padding;

            const combinedYMin = Math.min(rect.top, itemsRect.top) - padding;

            // Include padding for active panels

            const gradeMatch = String(className || '').match(/\d+/);
            if (gradeMatch) return gradeMatch[0];
            return String(className || '').trim();
        }

        function formatExpandedActivityLabel(activityLabel) {
            const label = normalizeSubjectLabel(activityLabel);
            if (!label) return 'Fri';
            const subjectInfo = getSubjectInfoFromActivityLabel(label);
            if (!subjectInfo) return label;
            const match = label.match(/^(\D+)/);
            const classNumber = match ? label.replace(match[1], '').trim() : '';
            return `${subjectInfo.full}${classNumber ? ` ${classNumber}` : ''}`.trim();
        }

        function formatExpandedActivityDisplay(activityText) {
            return String(activityText || '')
                .split('/')
                .map(part => formatExpandedActivityLabel(part))
                .join(' / ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function getStoredSubjectEmoji(className, activityLabel) {
            const trimmed = normalizeSubjectLabel(activityLabel);
            if (!trimmed) return '❓';
            const classData = classes[className];
            if (classData && classData.subjectEmojis && classData.subjectEmojis[trimmed]) {
                return classData.subjectEmojis[trimmed];
            }
            const subjectInfo = getSubjectInfoFromActivityLabel(trimmed);
            return subjectInfo?.emoji || '❓';
        }

        function formatMinutesAsTime(minutes) {
            const safeMinutes = Math.max(0, parseInt(minutes || '0', 10));
            const hours = Math.floor(safeMinutes / 60);
            const mins = safeMinutes % 60;
            return `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
        }

        function getClassScheduleState(className, currentDay, currentMinutes) {
            const classData = classes[className];
            if (!classData || !classData.schedule) return null;
            ensureClassData(classData);

            const todaySchedule = [...(classData.schedule[currentDay] || [])]
                .sort((a, b) => getMinutesFromTime(a.time) - getMinutesFromTime(b.time));
            const breakSchedule = [...(classData.breaks[currentDay] || [])]
                .sort((a, b) => getMinutesFromTime(a.time) - getMinutesFromTime(b.time));
            const mondaySchedule = [...(classData.schedule["Mandag"] || [])]
                .sort((a, b) => getMinutesFromTime(a.time) - getMinutesFromTime(b.time));
            const schoolDayStart = getMinutesFromTime("08:30");
            const fallbackSchoolDayDuration = ["Mandag", "Torsdag", "Fredag"].includes(currentDay) ? 360 : 305;
            const fallbackSchoolDayEnd = schoolDayStart + fallbackSchoolDayDuration;
            const firstClassTime = todaySchedule.length ? getMinutesFromTime(todaySchedule[0].time) : schoolDayStart;
            const mondaySchoolStart = mondaySchedule.length ? getMinutesFromTime(mondaySchedule[0].time) : schoolDayStart;

            const mergedDayEvents = [
                ...todaySchedule.map(event => ({ ...event, type: "class" })),
                ...breakSchedule.map(event => ({ ...event, type: "break" }))
            ].sort((a, b) => getMinutesFromTime(a.time) - getMinutesFromTime(b.time));

            const normalizedDayEvents = mergedDayEvents.map((event, index) => {
                const start = getMinutesFromTime(event.time);
                const explicitEnd = event.end ? getMinutesFromTime(event.end) : null;
                const nextStart = index + 1 < mergedDayEvents.length
                    ? getMinutesFromTime(mergedDayEvents[index + 1].time)
                    : fallbackSchoolDayEnd;
                const end = explicitEnd !== null ? explicitEnd : nextStart;
                const displayActivity = getTempScheduleValue(className, currentDay, event.time, event.activity);
                return { ...event, start, end, displayActivity };
            });

            const schoolDayEnd = normalizedDayEvents.length
                ? Math.max(...normalizedDayEvents.map(event => event.end))
                : fallbackSchoolDayEnd;

            let currentActivity = "FRI";
            let currentEventEnd = null;
            const activeEvent = normalizedDayEvents.find(event => currentMinutes >= event.start && currentMinutes < event.end);
            if (activeEvent) {
                currentEventEnd = activeEvent.end;
                currentActivity = activeEvent.displayActivity || activeEvent.activity;
            }

            return {
                className,
                classData,
                todaySchedule,
                breakSchedule,
                mondaySchedule,
                normalizedDayEvents,
                schoolDayStart,
                schoolDayEnd,
                firstClassTime,
                mondaySchoolStart,
                currentActivity,
                currentEventEnd,
                activeEvent
            };
        }

        function selectClass(name) {
            currentClassName = name;
            localStorage.setItem('currentClassName', name);
            currentClass = classes[name];
            closeCountdownModal();

            // Ensure required sub-objects exist
            ensureClassData(currentClass);
            if (!activeTimelineClassNames.includes(name)) {
                if (activeTimelineClassNames.length >= 2) {
                    const secondary = activeTimelineClassNames.find(className => className !== currentClassName);
                    activeTimelineClassNames = secondary ? [name, secondary] : [name];
                } else {
                    activeTimelineClassNames.unshift(name);
                }
                activeTimelineClassNames = normalizeActiveTimelineClassNames(activeTimelineClassNames);
                saveActiveTimelineClassNames();
            } else {
                activeTimelineClassNames = [name, ...activeTimelineClassNames.filter(className => className !== name)];
                saveActiveTimelineClassNames();
            }

            renderClassGrid();
            document.getElementById('edit-schedule-btn').style.display = 'inline-block';
            document.getElementById('edit-schedule-btn').onclick = openScheduleEditor;
            const subjBtn = document.getElementById('subject-color-btn');
            subjBtn.style.display = 'inline-block';
            subjBtn.onclick = openSubjectColorPicker;

            // Update main UI in background
            lastTimelineState = null;
            updateAgendaSubjects();
            renderAgenda();
            renderCountdownPanels();
            updateActivityAndCountdown();
        }

        function toggleTimelineClass(name) {
            const isActive = activeTimelineClassNames.includes(name);
            if (isActive) {
                if (activeTimelineClassNames.length === 1) return;
                activeTimelineClassNames = activeTimelineClassNames.filter(className => className !== name);
                if (currentClassName === name) {
                    currentClassName = activeTimelineClassNames[0];
                    currentClass = classes[currentClassName];
                    ensureClassData(currentClass);
                    localStorage.setItem('currentClassName', currentClassName);
                }
            } else if (activeTimelineClassNames.length < 2) {
                activeTimelineClassNames = [...activeTimelineClassNames, name];
            } else {
                const keepName = currentClassName && activeTimelineClassNames.includes(currentClassName)
                    ? currentClassName
                    : activeTimelineClassNames[0];
                activeTimelineClassNames = [keepName, name];
            }

            activeTimelineClassNames = normalizeActiveTimelineClassNames(activeTimelineClassNames);
            saveActiveTimelineClassNames();
            closeCountdownModal();
            renderClassGrid();
            lastTimelineState = null;
            updateAgendaSubjects();
            renderAgenda();
            renderCountdownPanels();
            updateActivityAndCountdown();
        }

        function renameCurrentClass() {
            if (!currentClassName || !classes[currentClassName]) return;
            const oldName = currentClassName;
            const input = prompt("Nytt navn på klassen:", oldName);
            if (input === null) return;
            const newName = input.trim();
            if (!newName) {
                alert("Klassen må ha et navn.");
                return;
            }
            if (newName === oldName) return;
            if (classes[newName]) {
                alert("En klasse med dette navnet finnes allerede.");
                return;
            }

            classes[newName] = classes[oldName];
            classes[newName].name = newName;
            delete classes[oldName];
            activeTimelineClassNames = activeTimelineClassNames.map(className => className === oldName ? newName : className);

            const oldShiftKey = `paletteShiftIndex:${oldName}`;
            const newShiftKey = `paletteShiftIndex:${newName}`;
            const shiftValue = localStorage.getItem(oldShiftKey);
            if (shiftValue !== null) {
                localStorage.setItem(newShiftKey, shiftValue);
                localStorage.removeItem(oldShiftKey);
            }

            currentClassName = newName;
            currentClass = classes[newName];
            closeCountdownModal();
            saveClasses();
            saveActiveTimelineClassNames();
            localStorage.setItem('currentClassName', newName);
            renderClassGrid();
            lastTimelineState = null;
            updateAgendaSubjects();
            renderAgenda();
            renderCountdownPanels();
            updateActivityAndCountdown();
        }

        function deleteCurrentClass() {
            if (!currentClassName || !classes[currentClassName]) return;
            const names = Object.keys(classes);
            if (names.length <= 1) {
                alert("Du må ha minst én klasse.");
                return;
            }
            const targetName = currentClassName;
            const ok = confirm(`Slette klassen \"${targetName}\"?`);
            if (!ok) return;

            delete classes[targetName];
            localStorage.removeItem(`paletteShiftIndex:${targetName}`);
            activeTimelineClassNames = activeTimelineClassNames.filter(className => className !== targetName);

            const nextName = Object.keys(classes)[0];
            currentClassName = nextName;
            currentClass = classes[nextName];
            ensureClassData(currentClass);
            closeCountdownModal();

            saveClasses();
            saveActiveTimelineClassNames();
            localStorage.setItem('currentClassName', nextName);
            renderClassGrid();
            lastTimelineState = null;
            updateAgendaSubjects();
            renderAgenda();
            renderCountdownPanels();
            updateActivityAndCountdown();
        }

        function populateEditorData(maxSlots) {
            const days = ["Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag"];

            // Initializing mainTimes if missing
            if (!currentClass.mainTimes) {
                currentClass.mainTimes = (currentClass.schedule["Mandag"] || []).map(e => ({ start: e.time, end: e.end }));
            }

            // Fill Main Times
            currentClass.mainTimes.forEach((mt, i) => {
                const startInput = document.querySelector(`.main-start[data-index="${i}"]`);
                const endInput = document.querySelector(`.main-end[data-index="${i}"]`);
                if (startInput) startInput.value = mt.start;

            });

            // Fill Activities
            days.forEach(day => {
                const combined = [...(currentClass.schedule[day] || []), ...(currentClass.breaks[day] || [])]
                    .sort((a, b) => getMinutesFromTime(a.time) - getMinutesFromTime(b.time));

                combined.forEach((entry, i) => {
                    const cell = document.querySelector(`.editor-cell[data-day="${day}"][data-index="${i}"]`);
                    if (cell) {
                        const input = cell.querySelector('.activity-input');
                        input.value = entry.activity;

                        // Check for time override
                        const mainTime = currentClass.mainTimes[i];
                        if (mainTime && (entry.time !== mainTime.start || entry.end !== mainTime.end)) {
                            showOverrideInputs(cell, entry.time, entry.end);
                        }
                    }
                });
            });
        }

        // --- Fagfarger (Subject Colors) ---

        function getUniqueSubjects() {
            const subjects = new Set();
            ["Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag"].forEach(day => {
                const combined = [
                    ...(currentClass.schedule[day] || []),
                    ...(currentClass.breaks[day] || [])
                ];
                combined.forEach(entry => {
                    const activity = entry.activity;
                    if (!activity) return;
                    // Split sammenslåtte fag (e.g. "Norsk 7. / Matte 8.")
                    const parts = activity.split('/').map(p => p.trim());
                    parts.forEach(p => {
                        const normalized = normalizeSubjectLabel(p);
                        if (normalized) subjects.add(normalized);
                    });
                });
            });
            return Array.from(subjects).sort();
        }

        function getSubjectDefaultColor(subject) {
            // Check if we have a match in subjectMap for emoji/full name
            const normalizedSubject = normalizeSubjectLabel(subject);
            const match = normalizedSubject.match(/^(\D+)/);
            if (match) {
                const subjectPart = match[1].trim().toUpperCase();
                const subjectInfo = Object.values(subjectMap).find(s =>
                    s.full.toUpperCase() === subjectPart || s.short.toUpperCase() === subjectPart);
                if (subjectInfo && colorMap[subjectInfo.full]) return colorMap[subjectInfo.full];
            }
            return "#ffffff"; // Default
        }

        function pickColorForSubject(subject) {
            const modal = document.getElementById('color-detail-modal');
            const title = document.getElementById('color-subject-title');
            const preview = document.getElementById('color-preview-large');
            const colorInput = document.getElementById('subject-color-input');
            const hexInput = document.getElementById('subject-hex-input');
            const saveBtn = document.getElementById('subject-color-save');
            const cancelBtn = document.getElementById('subject-color-cancel');
            const copyBtn = document.getElementById('subject-color-copy');
            const pasteBtn = document.getElementById('subject-color-paste');
            const emojiBtn = document.getElementById('subject-emoji-btn');
            const emojiPreview = document.getElementById('subject-emoji-preview');

            const currentColor = currentClass.subjectColors[subject] || getSubjectDefaultColor(subject);
            const subjectInfo = getSubjectInfoFromActivityLabel(subject);
            const currentEmoji = (currentClass.subjectEmojis && currentClass.subjectEmojis[subject]) || subjectInfo?.emoji || '🎨';

            title.textContent = `Farge for: ${subject}`;
            colorInput.value = currentColor.startsWith('#') ? currentColor : '#ffffff';
            hexInput.value = colorInput.value.toUpperCase();
            preview.style.backgroundColor = colorInput.value;
            emojiPreview.textContent = currentEmoji;

            modal.classList.add('active');

            colorInput.oninput = (e) => {
                hexInput.value = e.target.value.toUpperCase();
                preview.style.backgroundColor = e.target.value;
            };

            hexInput.oninput = (e) => {
                let val = e.target.value;
                if (val && !val.startsWith('#')) val = '#' + val;
                if (/^#[0-9A-F]{6}$/i.test(val)) {
                    colorInput.value = val;
                    preview.style.backgroundColor = val;
                }
            };

            copyBtn.onclick = () => {
                navigator.clipboard.writeText(hexInput.value);
                const oldText = copyBtn.textContent;
                copyBtn.textContent = "✅ Kopiert!";
                setTimeout(() => copyBtn.textContent = oldText, 2000);
            };

            pasteBtn.onclick = async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    let val = text.trim();
                    if (val && !val.startsWith('#')) val = '#' + val;
                    if (/^#[0-9A-F]{6}$/i.test(val)) {
                        hexInput.value = val.toUpperCase();
                        colorInput.value = hexInput.value;
                        preview.style.backgroundColor = hexInput.value;
                    }
                } catch (err) {
                    console.error('Failed to paste:', err);
                }
            };

            saveBtn.onclick = () => {
                currentClass.subjectColors[subject] = hexInput.value;
                if (!currentClass.subjectEmojis) currentClass.subjectEmojis = {};
                currentClass.subjectEmojis[subject] = emojiPreview.textContent;
                saveClasses();
                modal.classList.remove('active');

                lastTimelineState = null; // Force timeline refresh

                modal.classList.remove('active');

                const picker = document.createElement('div');
                picker.className = 'emoji-picker subject-emoji-picker';
                emojis.forEach(em => {
                    const btn = document.createElement('div');
                    btn.className = 'emoji-btn';
                    btn.textContent = em;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        emojiPreview.textContent = em;
                        picker.remove();
                    };
                    picker.appendChild(btn);
                });
                const rect = emojiBtn.getBoundingClientRect();
                picker.style.position = 'fixed';
                picker.style.top = `${rect.bottom + 8}px`;
                picker.style.left = `${rect.left}px`;
                document.body.appendChild(picker);

                const closePicker = (e) => {
                    if (!picker.contains(e.target) && e.target !== emojiBtn) {
                        picker.remove();
                        document.removeEventListener('click', closePicker);
                    }
                };
                setTimeout(() => document.addEventListener('click', closePicker), 0);
            };

            const btn = cell.querySelector('.time-override');

            div.className = 'override-inputs';

        function saveSchedule() {
            const days = ["Mandag", "Tirsdag", "Onsdag", "Torsdag", "Fredag"];
            const newMainTimes = [];

            // Read Main Times
            document.querySelectorAll('.main-start').forEach((input, i) => {
                const start = input.value;
                const end = document.querySelector(`.main-end[data-index="${i}"]`).value;
                if (start && end) newMainTimes.push({ start, end });
            });
            currentClass.mainTimes = newMainTimes;

            // Read Schedule for each day
            days.forEach(day => {
                const newSchedule = [];
                const newBreaks = [];

                for (let i = 0; i < 20; i++) { // Max potential slots
                    const cell = document.querySelector(`.editor-cell[data-day="${day}"][data-index="${i}"]`);
                    if (!cell) continue;

                    const activity = cell.querySelector('.activity-input').value.trim();
                    if (!activity) continue;

                    let start, end;
                    const override = cell.querySelector('.override-inputs');
                    if (override) {
                        const inputs = override.querySelectorAll('input');
                        start = inputs[0].value;
                        end = inputs[1].value;
                    } else if (newMainTimes[i]) {
                        start = newMainTimes[i].start;
                        end = newMainTimes[i].end;
                    }

                    if (start && end) {
                        const entry = { time: start, activity, end };
                        if (activity.toLowerCase() === "pause" || activity.toLowerCase() === "mat" || activity.toLowerCase() === "storefri") {
                            entry.type = "break";
                            newBreaks.push(entry);
                        } else {
                            newSchedule.push(entry);
                        }
                    }
                }
                currentClass.schedule[day] = newSchedule;
                currentClass.breaks[day] = newBreaks;
            });

            saveClasses();
            renderClassGrid();
            alert("Timeplan lagret!");
        }

        function updateAgendaSubjects() {
            const subjects = new Set();
            Object.values(currentClass.schedule).forEach(dayArr => {
                dayArr.forEach(entry => {
                    if (!entry.activity) return;
                    entry.activity.split('/').forEach(a => subjects.add(a.trim()));
                });
            });
            const currentSelection = normalizeSubjectLabel(agendaSubjectSelect.value);
            agendaSubjectSelect.innerHTML = '<option value="">Velg fag...</option>';
            const sortedSubjects = Array.from(subjects)
                .map(sub => normalizeSubjectLabel(sub))
                .filter(Boolean)
                .filter((sub, index, arr) => arr.indexOf(sub) === index)
                .sort();

            sortedSubjects.forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub;
                opt.textContent = sub;
                agendaSubjectSelect.appendChild(opt);
            });

            agendaSubjectSelect.value = sortedSubjects.includes(currentSelection) ? currentSelection : '';
            renderAgendaSubjectMenu(sortedSubjects, agendaSubjectSelect.value);
            syncAgendaSubjectUI();
        }

            if (!normalizedSubject) {
                agendaSidebar.style.removeProperty('--agenda-panel-color');
                agendaSidebar.style.removeProperty('--agenda-panel-text');
                agendaSidebar.style.removeProperty('--agenda-card-bg');
                agendaSidebar.style.removeProperty('--agenda-chip-bg');
                agendaSidebar.style.removeProperty('--agenda-chip-text');
                agendaSidebar.style.removeProperty('--agenda-border');
                return;
            }

            const baseColor = (currentClass.subjectColors && currentClass.subjectColors[normalizedSubject]) || getSubjectDefaultColor(normalizedSubject);
            if (!baseColor || baseColor === '#ffffff') {
                agendaSidebar.style.removeProperty('--agenda-panel-color');
                agendaSidebar.style.removeProperty('--agenda-panel-text');
                agendaSidebar.style.removeProperty('--agenda-card-bg');
                agendaSidebar.style.removeProperty('--agenda-chip-bg');
                agendaSidebar.style.removeProperty('--agenda-chip-text');
                agendaSidebar.style.removeProperty('--agenda-border');
                return;
            }

            const textColor = getReadableAgendaTextColor(baseColor);
            const isDarkText = textColor === '#5F5F5F';
            agendaSidebar.style.setProperty('--agenda-panel-color', baseColor);
            agendaSidebar.style.setProperty('--agenda-panel-text', textColor);
            agendaSidebar.style.setProperty('--agenda-card-bg', isDarkText ? 'rgba(255, 255, 255, 0.38)' : 'rgba(255, 255, 255, 0.16)');
            agendaSidebar.style.setProperty('--agenda-chip-bg', isDarkText ? 'rgba(255, 255, 255, 0.54)' : 'rgba(255, 255, 255, 0.18)');
            agendaSidebar.style.setProperty('--agenda-chip-text', textColor);
            agendaSidebar.style.setProperty('--agenda-border', isDarkText ? 'rgba(255, 255, 255, 0.5)' : 'rgba(255, 255, 255, 0.24)');

            if (items.length === 0) {
                agendaItemsContainer.innerHTML = `<div class="agenda-empty-state">Ingen gjøremål for ${subject} enda.</div>`;

            items.forEach((item, index) => {

                div.draggable = editPermission;
                div.dataset.index = index;
                div.innerHTML = `
                    <span class="agenda-item-emoji">${item.emoji || '📋'}</span>

                const suspendDrag = () => {
                    div.draggable = false;

                    e.stopPropagation();
                    suspendDrag();

                deleteBtn.addEventListener('pointercancel', restoreDrag);

                deleteBtn.addEventListener('click', (e) => {

                        restoreDrag();

                        renderAgenda();

        function setupDragAndDrop(el, subject) {
            el.addEventListener('dragstart', (e) => {
                draggedAgendaItem = el;
                draggedAgendaSubject = subject;
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', el.dataset.index);
                el.classList.add('dragging');
            });

            el.addEventListener('dragend', () => {
                el.classList.remove('dragging');
                draggedAgendaItem = null;
                draggedAgendaSubject = '';
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.agenda-item:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        if (agendaItemsContainer) {
            agendaItemsContainer.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (!draggedAgendaItem) return;
                const afterElement = getDragAfterElement(agendaItemsContainer, e.clientY);
                if (!afterElement) {
                    agendaItemsContainer.appendChild(draggedAgendaItem);
                } else {
                    agendaItemsContainer.insertBefore(draggedAgendaItem, afterElement);
                }
            });

            agendaItemsContainer.addEventListener('drop', (e) => {
                e.preventDefault();
                if (!draggedAgendaItem || !draggedAgendaSubject) return;
                const items = currentClass.agendas[draggedAgendaSubject] || [];
                const newList = [];
                agendaItemsContainer.querySelectorAll('.agenda-item').forEach((itemEl) => {
                    const itemIndex = parseInt(itemEl.dataset.index || '-1', 10);
                    if (items[itemIndex]) {
                        newList.push(items[itemIndex]);
                    }
                });
                currentClass.agendas[draggedAgendaSubject] = newList;
                saveClasses();
                renderAgenda();
            });
        }

        function updateTimerToggleButton() {
            const playIcon = timerStart.querySelector('.timer-icon-play');
            const pauseIcon = timerStart.querySelector('.timer-icon-pause');
            if (!playIcon || !pauseIcon) return;
            playIcon.style.display = isRunning ? 'none' : 'block';
            pauseIcon.style.display = isRunning ? 'block' : 'none';
        }

        function updateTimerDisplay() {
            const totalSeconds = Math.max(0, Math.ceil(remainingTime / 1000));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            timerDisplay.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if (timerCenter) {
                timerCenter.classList.remove('layout-sec-only', 'layout-min-sec', 'layout-hour-min-sec');
            }
            if (hours > 0) {
                if (timerCenter) timerCenter.classList.add('layout-hour-min-sec');
                if (timerHourReadout) timerHourReadout.textContent = hours.toString().padStart(2, '0');
                if (timerMinReadout) timerMinReadout.textContent = minutes.toString().padStart(2, '0');
                if (timerSecReadout) timerSecReadout.textContent = seconds.toString().padStart(2, '0');
            } else if (totalSeconds >= 60) {
                if (timerCenter) timerCenter.classList.add('layout-min-sec');
                const totalMinutes = Math.floor(totalSeconds / 60);
                if (timerMinReadout) timerMinReadout.textContent = totalMinutes.toString().padStart(2, '0');
                if (timerSecReadout) timerSecReadout.textContent = seconds.toString().padStart(2, '0');
                if (timerHourReadout) timerHourReadout.textContent = '00';
            } else {
                if (timerCenter) timerCenter.classList.add('layout-sec-only');
                if (timerSecReadout) timerSecReadout.textContent = seconds.toString().padStart(2, '0');
                if (timerMinReadout) timerMinReadout.textContent = '00';
                if (timerHourReadout) timerHourReadout.textContent = '00';
            }

            const progress = totalTime > 0 ? Math.max(0, Math.min(1, remainingTime / totalTime)) : 1;
            const offset = circumference * (1 - progress);
            circleFill.style.strokeDashoffset = offset;
            updateTimerToggleButton();
        }

        function stopTimerAnimation() {
            if (timerAnimationFrame) {
                cancelAnimationFrame(timerAnimationFrame);
                timerAnimationFrame = null;
            }
        }

        function runTimerAnimation() {
            if (!isRunning) return;
            const now = performance.now();
            remainingTime = Math.max(0, timerEndAt - now);
            updateTimerDisplay();

            if (remainingTime <= 0) {
                // Same behavior as manual reset: full ring + play icon ready for a new run.
                resetTimer();
                return;
            }

            timerAnimationFrame = requestAnimationFrame(runTimerAnimation);
        }

        function startInterval() {
            timerEndAt = performance.now() + remainingTime;
            stopTimerAnimation();
            timerAnimationFrame = requestAnimationFrame(runTimerAnimation);
        }

        function pauseTimer() {
            remainingTime = Math.max(0, timerEndAt - performance.now());
            isRunning = false;
            isPaused = true;
            stopTimerAnimation();
            updateTimerDisplay();
        }

        function startOrPauseTimer() {
            if (isRunning) {
                pauseTimer();
                return;
            }

            if (remainingTime <= 0) {
                const hours = parseInt(timerHours.value, 10) || 0;
                const minutes = parseInt(timerMinutes.value, 10) || 0;
                const seconds = parseInt(timerSeconds.value, 10) || 0;
                totalTime = ((hours * 3600) + (minutes * 60) + seconds) * 1000;
                if (totalTime <= 0) return;
                remainingTime = totalTime;
            }

            isRunning = true;
            isPaused = false;
            startInterval();
            updateTimerDisplay();
        }

        function clampTimerInputValue(inputEl) {
            const max = parseInt(inputEl.max, 10);
            const min = parseInt(inputEl.min, 10);
            const parsed = parseInt(inputEl.value, 10);
            const safeMin = Number.isFinite(min) ? min : 0;
            const safeMax = Number.isFinite(max) ? max : 999;
            const nextValue = Number.isFinite(parsed) ? Math.min(safeMax, Math.max(safeMin, parsed)) : safeMin;
            inputEl.value = String(nextValue);
            return nextValue;
        }
